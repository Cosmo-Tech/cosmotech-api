openapi: 3.0.3

info:
  title: ""
  version: ""

security:
  - oAuth2AuthCode: []

tags:
- name: connector
  description: Connector Management

paths:
  /connectors:
    post:
      operationId: registerConnector
      tags:
        - connector
      summary: Register a new connector
      requestBody:
        description: the Connector to register
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Connector'
            examples:
              ADTConnectorRequest:
                $ref: '#/components/examples/ADTConnectorRequest'
          application/yaml:
            schema:
              type: string
              format: binary
            examples:
              ADTConnectorRequest:
                $ref: '#/components/examples/ADTConnectorRequest'
      responses:
        "201":
          description: the connector details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Connector'
              examples:
                ADTConnectorResponse:
                  $ref: '#/components/examples/ADTConnectorResponse'
        "400":
          description: Bad request
    get:
      operationId: findAllConnectors
      tags:
        - connector
      parameters:
        - name: page
          in: query
          description: page number to query (first page is at index 0)
          required: false
          schema:
            type: integer
        - name: size
          in: query
          description: amount of result by page
          required: false
          schema:
            type: integer
      summary: List all Connectors
      responses:
        "200":
          description: the list of Connectors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Connector'
              examples:
                ConnectorListResponse:
                  $ref: '#/components/examples/ConnectorListResponse'

  /connectors/{connector_id}:
    parameters:
      - name: connector_id
        in: path
        description: the Connector identifier
        required: true
        schema:
          type: string
    get:
      operationId: findConnectorById
      tags:
        - connector
      summary: Get the details of a connector
      responses:
        "200":
          description: the Connector details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Connector'
              examples:
                ADTConnectorResponse:
                  $ref: '#/components/examples/ADTConnectorResponse'
        "404":
          description: the Connector specified is unknown or you don't have access to it
    delete:
      operationId: unregisterConnector
      tags:
        - connector
      summary: Unregister a connector
      responses:
        "204":
          description: Request successful
        "404":
          description: the Connector specified is unknown or you don't have access to it

components:
  securitySchemes:
    oAuth2AuthCode:
      type: oauth2
      description: OAuth2 authentication
      flows:
        authorizationCode:
          authorizationUrl: "https://example.com/authorize"
          tokenUrl: "https://example.com/token"
          scopes: {}
  schemas:
    Connector:
      type: object
      x-class-extra-annotation: "@com.redis.om.spring.annotations.Document"
      description: a version of a Connector
      properties:
        id:
          type: string
          x-field-extra-annotation: "@org.springframework.data.annotation.Id"
          readOnly: true
          description: the Connector version unique identifier
        key:
          type: string
          description: the Connector key which group Connector versions
        name:
          type: string
          x-field-extra-annotation: "@com.redis.om.spring.annotations.Searchable"
          description: the Connector name
        description:
          type: string
          description: the Connector description
        repository:
          type: string
          description: the registry repository containing the image
        version:
          type: string
          description: the Connector version MAJOR.MINOR.PATCH. Must be aligned with an existing repository tag
        tags:
          type: array
          description: the list of tags
          items:
            type: string
        ownerId:
          type: string
          readOnly: true
          description: the user id which own this connector version
        url:
          type: string
          description: an optional URL link to connector page
        ioTypes:
          type: array
          items:
            $ref: '#/components/schemas/ioTypesEnum'
        parameterGroups:
          type: array
          description: the list of connector parameters groups
          items:
            $ref: '#/components/schemas/ConnectorParameterGroup'
    ioTypesEnum:
      type: string
      description: The read and write capabilities of connector
      enum:
        - read
        - write
    ConnectorParameterGroup:
      type: object
      description: a connector parameters group
      properties:
        id:
          type: string
          description: the connector parameter group id
        label:
          type: string
          description: the list of translated parameter group labels
        parameters:
          type: array
          description: the list of parameters
          items:
            $ref: '#/components/schemas/ConnectorParameter'
      required:
        - id
        - label
        - parameters
    ConnectorParameter:
      type: object
      description: a connector parameter
      properties:
        id:
          type: string
          description: the connector parameter id
        label:
          type: string
          description: the list of translated parameter group labels
        valueType:
          type: string
          description: the parameter value type
        options:
          type: array
          description: the list of available and valid values for the parameter
          items:
            type: string
        default:
          type: string
          description: the default value
        envVar:
          type: string
          description: associated environment variable in connector image
      required:
        - id
        - label
  examples:
    ADTConnectorRequest:
      summary: ADT Connector Request
      description: Example request body for registering an ADT connector
      value:
        key: azure-dt
        name: Azure Digital Twins Connector
        description: Connector for Azure Digital Twins integration - reads ADT data and exports to CSV
        repository: cosmotech/azure-digital-twins-connector
        version: "2.0.0"
        tags:
          - azure
          - adt
          - digital-twins
        url: https://github.com/Cosmo-Tech/azure-digital-twins-connector
        ioTypes:
          - read
        parameterGroups:
          - id: authentication
            label: Azure Authentication
            parameters:
              - id: AZURE_TENANT_ID
                label: Azure Tenant ID
                valueType: string
                envVar: AZURE_TENANT_ID
              - id: AZURE_CLIENT_ID
                label: Azure Client ID
                valueType: string
                envVar: AZURE_CLIENT_ID
              - id: AZURE_CLIENT_SECRET
                label: Azure Client Secret
                valueType: password
                envVar: AZURE_CLIENT_SECRET
          - id: configuration
            label: ADT Configuration
            parameters:
              - id: AZURE_DT_ENDPOINT
                label: ADT Instance Endpoint
                valueType: string
                envVar: AZURE_DT_ENDPOINT
              - id: QUERY_FILTER
                label: ADT Query Filter
                valueType: string
                envVar: ADT_QUERY_FILTER
                default: SELECT * FROM digitaltwins
              - id: OUTPUT_PATH
                label: Output File Path
                valueType: string
                default: /data/output
                envVar: CSV_OUTPUT_PATH

    ADTConnectorResponse:
      summary: ADT Connector Response
      description: Example response for a registered ADT connector
      value:
        id: "c12e3456-78ab-90cd-efgh-ijklmnopqrst"
        key: azure-dt
        name: Azure Digital Twins Connector
        description: Connector for Azure Digital Twins integration - reads ADT data and exports to CSV
        repository: cosmotech/azure-digital-twins-connector
        version: "2.0.0"
        tags:
          - azure
          - adt
          - digital-twins
        ownerId: "u98f7654-32dc-10ba-hgfe-tsrqponmlkji"
        url: https://github.com/Cosmo-Tech/azure-digital-twins-connector
        ioTypes:
          - read
        parameterGroups:
          - id: authentication
            label: Azure Authentication
            parameters:
              - id: AZURE_TENANT_ID
                label: Azure Tenant ID
                valueType: string
                envVar: AZURE_TENANT_ID
              - id: AZURE_CLIENT_ID
                label: Azure Client ID
                valueType: string
                envVar: AZURE_CLIENT_ID
              - id: AZURE_CLIENT_SECRET
                label: Azure Client Secret
                valueType: password
                envVar: AZURE_CLIENT_SECRET
          - id: configuration
            label: ADT Configuration
            parameters:
              - id: AZURE_DT_ENDPOINT
                label: ADT Instance Endpoint
                valueType: string
                envVar: AZURE_DT_ENDPOINT
              - id: QUERY_FILTER
                label: ADT Query Filter
                valueType: string
                envVar: ADT_QUERY_FILTER
                default: SELECT * FROM digitaltwins
              - id: OUTPUT_PATH
                label: Output File Path
                valueType: string
                default: /data/output
                envVar: CSV_OUTPUT_PATH

    ConnectorListResponse:
      summary: Connector List Response
      description: Example response for listing connectors
      value:
        - id: "c12e3456-78ab-90cd-efgh-ijklmnopqrst"
          key: azure-dt
          name: Azure Digital Twins Connector
          description: Connector for Azure Digital Twins integration - reads ADT data and exports to CSV
          repository: cosmotech/azure-digital-twins-connector
          version: "2.0.0"
          tags:
            - azure
            - adt
            - digital-twins
          ownerId: "u98f7654-32dc-10ba-hgfe-tsrqponmlkji"
          url: https://github.com/Cosmo-Tech/azure-digital-twins-connector
          ioTypes:
            - read
          parameterGroups:
            - id: authentication
              label: Azure Authentication
              parameters:
                - id: AZURE_TENANT_ID
                  label: Azure Tenant ID
                  valueType: string
                  envVar: AZURE_TENANT_ID
                - id: AZURE_CLIENT_ID
                  label: Azure Client ID
                  valueType: string
                  envVar: AZURE_CLIENT_ID
                - id: AZURE_CLIENT_SECRET
                  label: Azure Client Secret
                  valueType: password
                  envVar: AZURE_CLIENT_SECRET
            - id: configuration
              label: ADT Configuration
              parameters:
                - id: AZURE_DT_ENDPOINT
                  label: ADT Instance Endpoint
                  valueType: string
                  envVar: AZURE_DT_ENDPOINT
                - id: QUERY_FILTER
                  label: ADT Query Filter
                  valueType: string
                  envVar: ADT_QUERY_FILTER
                  default: SELECT * FROM digitaltwins
                - id: OUTPUT_PATH
                  label: Output File Path
                  valueType: string
                  default: /data/output
                  envVar: CSV_OUTPUT_PATH
