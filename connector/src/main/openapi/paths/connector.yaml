paths:
  connectors:
    post:
      operationId: registerConnector
      tags:
        - connector
      summary: Register a new connector
      requestBody:
        description: the Connector to register
        required: true
        content:
          application/json:
            schema:
              $ref: '../connector.yaml#/components/schemas/Connector'
            examples:
              ADTConnectorRequest:
                $ref: '../connector.yaml#/components/examples/ADTConnectorRequest'
          application/yaml:
            schema:
              type: string
              format: binary
            examples:
              ADTConnectorRequest:
                $ref: '../connector.yaml#/components/examples/ADTConnectorRequest'
      responses:
        "201":
          description: the connector details
          content:
            application/json:
              schema:
                $ref: '../connector.yaml#/components/schemas/Connector'
              examples:
                ADTConnectorResponse:
                  $ref: '../connector.yaml#/components/examples/ADTConnectorResponse'
        "400":
          description: Bad request
    get:
      operationId: findAllConnectors
      tags:
        - connector
      parameters:
        - name: page
          in: query
          description: page number to query (first page is at index 0)
          required: false
          schema:
            type: integer
        - name: size
          in: query
          description: amount of result by page
          required: false
          schema:
            type: integer
      summary: List all Connectors
      responses:
        "200":
          description: the list of Connectors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '../connector.yaml#/components/schemas/Connector'
              examples:
                ConnectorListResponse:
                  $ref: '../connector.yaml#/components/examples/ConnectorListResponse'

  connectors/{connector_id}:
    parameters:
      - name: connector_id
        in: path
        description: the Connector identifier
        required: true
        schema:
          type: string
    get:
      operationId: findConnectorById
      tags:
        - connector
      summary: Get the details of a connector
      responses:
        "200":
          description: the Connector details
          content:
            application/json:
              schema:
                $ref: '../connector.yaml#/components/schemas/Connector'
              examples:
                ADTConnectorResponse:
                  $ref: '../connector.yaml#/components/examples/ADTConnectorResponse'
        "404":
          description: the Connector specified is unknown or you don't have access to it
    delete:
      operationId: unregisterConnector
      tags:
        - connector
      summary: Unregister a connector
      responses:
        "204":
          description: Request successful
        "404":
          description: the Connector specified is unknown or you don't have access to it
