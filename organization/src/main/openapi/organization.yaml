openapi: 3.0.3

info:
  title: ""
  version: ""

security:
  - oAuth2AuthCode: []

tags:
- name: organization
  description: Organization Management

paths:
  /organizations:
    post:
      operationId: registerOrganization
      tags:
        - organization
      summary: Register a new organization
      requestBody:
        description: the Organization to register
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Organization'
            examples:
              NewOrganizationIn:
                $ref: '#/components/examples/NewOrganizationIn'
          application/yaml:
            schema:
              type: string
              format: binary
            examples:
              NewOrganizationIn:
                $ref: '#/components/examples/NewOrganizationIn'
      responses:
        "201":
          description: the Organization details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
              examples:
                CosmoOrganization:
                  $ref: '#/components/examples/CosmoOrganization'
        "400":
          description: Bad request
    get:
      operationId: findAllOrganizations
      parameters:
        - name: page
          in: query
          description: page number to query (first page is at index 0)
          required: false
          schema:
            type: integer
        - name: size
          in: query
          description: amount of result by page
          required: false
          schema:
            type: integer
      tags:
        - organization
      summary: List all Organizations
      responses:
        "200":
          description: the list of Organizations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Organization'
              examples:
                TwoOrganizations:
                  $ref: '#/components/examples/TwoOrganizations'

  /organizations/{organization_id}:
    parameters:
      - name: organization_id
        in: path
        description: the Organization identifier
        required: true
        schema:
          type: string
    get:
      operationId: findOrganizationById
      tags:
        - organization
      summary: Get the details of an Organization
      responses:
        "200":
          description: the Organization details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
              examples:
                CosmoOrganization:
                  $ref: '#/components/examples/CosmoOrganization'
        "404":
          description: the Organization specified is unknown or you don't have access to it
    patch:
      operationId: updateOrganization
      tags:
        - organization
      summary: Update an Organization
      requestBody:
        description: the new Organization details. This endpoint can't be used to update security
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Organization'
            examples:
              ChangeName:
                summary: Change Name of Organization
                description: Change the name of Organization 1 to CosmoTech Digital Twins Engine
                value:
                  name: "CosmoTech Digital Twins Engine"
          application/yaml:
            schema:
              type: string
              format: binary
            examples:
              ChangeName:
                summary: Change Name of Organization
                description: Change the name of Organization 1 to CosmoTech Digital Twins Engine
                value:
                  name: "CosmoTech Digital Twins Engine"
      responses:
        "200":
          description: the organization details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
              examples:
                CosmoThreeUsers:
                  $ref: '#/components/examples/CosmoThreeUsers'
        "400":
          description: Bad request
        "404":
          description: the Organization specified is unknown or you don't have access to it
    delete:
      operationId: unregisterOrganization
      tags:
        - organization
      summary: Unregister an organization
      responses:
        "204":
          description: Request succeeded
        "404":
          description: the Organization specified is unknown or you don't have access to it

  /organizations/permissions:
    get:
      operationId: getAllPermissions
      tags:
        - organization
      summary: Get all permissions per components
      responses:
        "200":
          description: The security permission list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ComponentRolePermissions'
              examples:
                permissions:
                  $ref: '#/components/examples/Permissions'


  /organizations/{organization_id}/permissions/{role}:
    parameters:
      - name: organization_id
        in: path
        description: the Organization identifier
        required: true
        schema:
          type: string
      - name: role
        in: path
        description: the Role
        required: true
        schema:
          type: string
    get:
      operationId: getOrganizationPermissions
      tags:
        - organization
      summary: Get the Organization permissions by given role
      responses:
        "200":
          description: The Organization security permission list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
                example:
                  - "read"
                  - "read_security"
                  - "create_children"

  /organizations/{organization_id}/security:
    parameters:
      - name: organization_id
        in: path
        description: the Organization identifier
        required: true
        schema:
          type: string
    get:
      operationId: getOrganizationSecurity
      tags:
        - organization
      summary: Get the Organization security information
      responses:
        "200":
          description: The Organization security
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationSecurity'
              examples:
                OrganizationSecurity:
                  $ref: '#/components/examples/BreweryOrganizationSecurity'
        "404":
          description: the Organization specified is unknown or you don't have access to it

  /organizations/{organization_id}/security/default:
    parameters:
      - name: organization_id
        in: path
        description: the Organization identifier
        required: true
        schema:
          type: string
    post:
      operationId: setOrganizationDefaultSecurity
      tags:
        - organization
      summary: Set the Organization default security
      requestBody:
        description: This change the organization default security.
                    The default security is the role assigned to any person not on the Access Control List.
                    If the default security is None, then nobody outside of the ACL can access the organization.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationRole'
            examples:
              BreweryOrganizationRole:
                $ref: '#/components/examples/BreweryOrganizationRole'
          application/yaml:
            schema:
              type: string
              format: binary
            examples:
              BreweryOrganizationRole:
                $ref: '#/components/examples/BreweryOrganizationRole'
      responses:
        "201":
          description: The Organization default visibility
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationSecurity'
              examples:
                WriterOrganizationSecurity:
                  $ref: '#/components/examples/BreweryDefaultSecurityRoleWriter'
        "404":
          description: the Organization specified is unknown or you don't have access to it

  /organizations/{organization_id}/security/access:
    parameters:
      - name: organization_id
        in: path
        description: the Organization identifier
        required: true
        schema:
          type: string
    post:
      operationId: addOrganizationAccessControl
      tags:
        - organization
      summary: Add a control access to the Organization
      requestBody:
        description: the new Organization security access to add.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationAccessControl'
            examples:
              OrganizationAccess:
                $ref: '#/components/examples/BreweryOrganizationAccessControl'
          application/yaml:
            schema:
              type: string
              format: binary
            examples:
              OrganizationAccess:
                $ref: '#/components/examples/BreweryOrganizationAccessControl'
      responses:
        "201":
          description: The Organization access
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationAccessControl'
              examples:
                OrganizationAccessControl:
                  $ref: '#/components/examples/BreweryOrganizationAccessControl'
        "404":
          description: the Organization specified is unknown or you don't have access to it

  /organizations/{organization_id}/security/access/{identity_id}:
    parameters:
      - name: organization_id
        in: path
        description: the Organization identifier
        required: true
        schema:
          type: string
      - name: identity_id
        in: path
        description: the User identifier
        required: true
        schema:
          type: string
    get:
      operationId: getOrganizationAccessControl
      tags:
        - organization
      summary: Get a control access for the Organization
      responses:
        "200":
          description: The Organization access
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationAccessControl'
              examples:
                OrganizationAccessControl:
                  $ref: '#/components/examples/BreweryOrganizationAccessControl'
        "404":
          description: The Organization or user specified is unknown or you don't have access to it
    patch:
      operationId: updateOrganizationAccessControl
      tags:
        - organization
      summary: Update the specified access to User for an Organization
      requestBody:
        description: The new Organization Access Control
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationRole'
            examples:
              BreweryOrganizationRole:
                $ref: '#/components/examples/BreweryOrganizationRole'
      responses:
        "200":
          description: The Organization access
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationAccessControl'
              examples:
                OrganizationAccessControl:
                  $ref: '#/components/examples/BreweryOrganizationAccessControl'
        "404":
          description: The Organization specified is unknown or you don't have access to it
    delete:
      operationId: removeOrganizationAccessControl
      tags:
        - organization
      summary: Remove the specified access from the given Organization
      responses:
        "204":
          description: Request succeeded
        "404":
          description: the Organization or the user specified is unknown or you don't have access to them
  /organizations/{organization_id}/security/users:
    parameters:
      - name: organization_id
        in: path
        description: The Organization identifier
        required: true
        schema:
          type: string
    get:
      operationId: getOrganizationSecurityUsers
      tags:
        - organization
      summary: Get the Organization security users list
      responses:
        "200":
          description: The Organization security users list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
                example:
                  - alice@mycompany.com
                  - bob@mycompany.com
        "404":
          description: the Organization specified is unknown or you don't have access to it

components:
  securitySchemes:
    oAuth2AuthCode:
      type: oauth2
      description: OAuth2 authentication
      flows:
        authorizationCode:
          authorizationUrl: "https://example.com/authorize"
          tokenUrl: "https://example.com/token"
          scopes: {}
  schemas:
    Organization:
      type: object
      x-class-extra-annotation: "@com.redis.om.spring.annotations.Document"
      description: an Organization
      properties:
        id:
          x-field-extra-annotation: "@org.springframework.data.annotation.Id"
          type: string
          readOnly: true
          description: the Organization unique identifier
        name:
          type: string
          x-field-extra-annotation: "@com.redis.om.spring.annotations.Searchable"
          description: the Organization name
        ownerId:
          type: string
          readOnly: true
          description: the Owner User Id
        security:
          x-field-extra-annotation: "@com.redis.om.spring.annotations.Indexed"
          allOf:
            - $ref: '#/components/schemas/OrganizationSecurity'
#      required:
#        - name
    OrganizationSecurity:
      type: object
      description: the Organization security information
      properties:
        default:
          type: string
          x-field-extra-annotation: "@com.redis.om.spring.annotations.Indexed"
          description: the role by default
        accessControlList:
          type: array
          x-field-extra-annotation: "@com.redis.om.spring.annotations.Indexed"
          description: the list which can access this Organization with detailed access control information
          items:
            $ref: '#/components/schemas/OrganizationAccessControl'
      required:
        - default
        - accessControlList
    OrganizationAccessControl:
      type: object
      description: a Organization access control item
      properties:
        id:
          type: string
          x-field-extra-annotation: "@com.redis.om.spring.annotations.Indexed"
          description: the identity id
        role:
          type: string
          x-field-extra-annotation: "@com.redis.om.spring.annotations.Indexed"
          description: a role
      required:
        - id
        - role
    OrganizationRole:
      type: object
      description: the Organization Role
      properties:
        role:
          type: string
          description: the Organization Role
      required:
        - role
    ComponentRolePermissions:
      type: object
      description: a RBAC by component
      properties:
        component:
          type: string
        roles:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
  examples:
    NewOrganizationIn:
      summary: Create a new organization
      description: Create a new organization request example
      value:
        name: "Cosmo Tech Organization"
        security:
          default: "none"
          accessControlList:
            - id: "admin@cosmotech.com"
              role: "admin"
            - id: "dev.team@cosmotech.com"
              role: "editor"
            - id: "data.team@cosmotech.com"
              role: "viewer"
    CosmoOrganization:
      summary: Organization response example
      description: Example of an organization response after creation
      value:
        id: "o-123456789"
        name: "Cosmo Tech Organization"
        ownerId: "admin-user-id"
        security:
          default: "none"
          accessControlList:
            - id: "admin@cosmotech.com"
              role: "admin"
            - id: "dev.team@cosmotech.com"
              role: "editor"
            - id: "data.team@cosmotech.com"
              role: "viewer"
    BreweryOrganizationSecurity:
      summary: Organization security example
      description: Example of organization security configuration
      value:
        default: "none"
        accessControlList:
          - id: "security.admin@cosmotech.com"
            role: "admin"
          - id: "platform.dev@cosmotech.com"
            role: "editor"
          - id: "data.analyst@cosmotech.com"
            role: "viewer"
    BreweryOrganizationAccessControl:
      summary: Add organization access control
      description: Example request to add a new access control to an organization
      value:
        id: "new.user@cosmotech.com"
        role: "editor"
    BreweryOrganizationRole:
      summary: Set an Organization Role.
      description: Set an role for a user to an organization.
      value:
        role: "editor"
    CosmoThreeUsers:
      summary: Updated organization response
      description: Example response after updating organization access control
      value:
        id: "o-123456789"
        name: "Cosmo Tech Organization"
        ownerId: "admin-user-id"
        security:
          default: "none"
          accessControlList:
            - id: "team.lead@cosmotech.com"
              role: "admin"
            - id: "developer@cosmotech.com"
              role: "editor"
            - id: "analyst@cosmotech.com"
              role: "viewer"
    TwoOrganizations:
      summary: List organizations response
      description: Example response when listing multiple organizations
      value:
        - id: "o-123456789"
          name: "Manufacturing Solutions"
          ownerId: "admin-id-1"
          security:
            default: "none"
            accessControlList:
              - id: "manufacturing.admin@cosmotech.com"
                role: "admin"
              - id: "manufacturing.dev@cosmotech.com"
                role: "editor"
              - id: "manufacturing.analyst@cosmotech.com"
                role: "viewer"
        - id: "o-987654321"
          name: "Supply Chain Analytics"
          ownerId: "admin-id-2"
          security:
            default: "none"
            accessControlList:
              - id: "supply.admin@cosmotech.com"
                role: "admin"
              - id: "supply.dev@cosmotech.com"
                role: "editor"
              - id: "supply.analyst@cosmotech.com"
                role: "viewer"
    BreweryDefaultSecurityRoleWriter:
      summary: Brewery Scenario Writer default security
      description: Brewery Scenario example
      value:
        default: "editor"
    Permissions:
      summary: Permissions
      description: Permissions for Organization
      value:
        - component: organization
          roles:
            none: []
            viewer:
              - read
              - read_security
            user:
              - read
              - read_security
              - create_children
            editor:
              - read
              - read_security
              - create_children
              - write
            admin:
              - read
              - read_security
              - create_children
              - write
              - write_security
              - delete
        - component: workspace
          roles:
            none: []
            viewer:
              - read
              - read_security
            user:
              - read
              - read_security
              - create_children
            editor:
              - read
              - read_security
              - create_children
              - write
            admin:
              - read
              - read_security
              - create_children
              - write
              - write_security
              - delete
        - component: runner
          roles:
            none: []
            viewer:
              - read
              - read_security
            editor:
              - read
              - read_security
              - launch
              - write
            validator:
              - read
              - read_security
              - launch
              - write
              - validate
            admin:
              - read
              - read_security
              - launch
              - write
              - validate
              - write_security
              - delete
